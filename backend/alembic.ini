[alembic]
script_location = backend/migrations
sqlalchemy.url = postgresql://user:password@localhost/elon_bets

[post_write_hooks]

[loggers]
keys = root,sqlalchemy,alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)s:%(name)s:%(message)s
datefmt = %H:%M:%S

[logger_root]
level = INFO
handlers = console
qualname = 

[logger_sqlalchemy]
level = INFO
handlers = console
qualname = sqlalchemy

[logger_alembic]
level = INFO
handlers = console
qualname = alembic
